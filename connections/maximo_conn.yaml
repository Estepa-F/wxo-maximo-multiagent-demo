spec_version: v1
kind: connection
app_id: maximo_conn
# Note: cette URL est un placeholder public. Les scripts de configuration
# utilisent la variable MAXIMO_URL depuis .env.sdk pour définir la vraie
# valeur en draft/live.
environments:
  draft:
    kind: api_key
    type: team
    server_url: https://your-maximo-instance/maximo
  live:
    kind: api_key
    type: team
    server_url: https://your-maximo-instance/maximo
